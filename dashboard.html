<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* -------------------------------------------------------
       Reset & base
    ------------------------------------------------------- */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #0066FF;
      --blue-light: #EBF2FF;
      --red: #DC2626;
      --red-light: #FEF2F2;
      --green: #16A34A;
      --green-light: #F0FDF4;
      --amber: #D97706;
      --amber-light: #FFFBEB;
      --gray-50: #fafafa;
      --gray-100: #f5f5f5;
      --gray-200: #e5e5e5;
      --gray-300: #d4d4d4;
      --gray-400: #a3a3a3;
      --gray-500: #737373;
      --gray-600: #525252;
      --gray-700: #404040;
      --gray-800: #262626;
      --gray-900: #171717;
      --radius: 6px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* -------------------------------------------------------
       Nav
    ------------------------------------------------------- */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 15px;
      color: var(--gray-900);
      letter-spacing: -0.3px;
    }

    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--green);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .nav-time {
      font-size: 13px;
      color: var(--gray-500);
      font-variant-numeric: tabular-nums;
    }

    /* -------------------------------------------------------
       Container
    ------------------------------------------------------- */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 32px 64px;
    }

    /* -------------------------------------------------------
       Stats
    ------------------------------------------------------- */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .stat-card p {
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-card span {
      font-size: 32px;
      font-weight: 600;
      color: var(--gray-900);
      letter-spacing: -1px;
      line-height: 1;
    }

    .stat-card span.has-anomalies { color: var(--red); }

    .stat-unit {
      font-size: 16px !important;
      font-weight: 400 !important;
      color: var(--gray-400) !important;
      letter-spacing: 0 !important;
    }

    /* -------------------------------------------------------
       Main grid
    ------------------------------------------------------- */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    @media (min-width: 960px) {
      .main-grid { grid-template-columns: 65fr 35fr; }
    }

    .card {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--gray-200);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-900);
    }

    .card-body { padding: 24px; }

    /* -------------------------------------------------------
       Form
    ------------------------------------------------------- */
    .form-full { margin-bottom: 16px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 16px;
    }

    .form-group { margin-bottom: 12px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-700);
      margin-bottom: 4px;
    }

    .form-group input {
      width: 100%;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 14px;
      color: var(--gray-900);
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-light);
    }

    .form-group input::placeholder { color: var(--gray-400); }

    /* -------------------------------------------------------
       Buttons
    ------------------------------------------------------- */
    .btn-group {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-blue {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .btn-blue:hover:not(:disabled) { background: #0052CC; }

    .btn-outline {
      background: #fff;
      color: var(--gray-700);
      border-color: var(--gray-300);
    }
    .btn-outline:hover:not(:disabled) {
      background: var(--gray-50);
      border-color: var(--gray-400);
    }

    .btn-outline-red {
      background: #fff;
      color: var(--red);
      border-color: var(--red);
    }
    .btn-outline-red:hover:not(:disabled) { background: var(--red-light); }

    .btn-spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .btn.is-loading .btn-spinner { display: block; }
    .btn.is-loading .btn-text { opacity: 0.7; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Text-style button for "Clear" */
    .btn-text-only {
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-500);
      cursor: pointer;
    }
    .btn-text-only:hover { color: var(--gray-700); }

    /* -------------------------------------------------------
       Result
    ------------------------------------------------------- */
    .result-card {
      margin-top: 20px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      overflow: hidden;
      display: none;
    }

    .result-card.visible {
      display: block;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
    }

    .result-server {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-900);
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-green  { background: var(--green-light); color: var(--green); }
    .badge-red    { background: var(--red-light);   color: var(--red); }
    .badge-amber  { background: var(--amber-light); color: var(--amber); }

    .result-body { padding: 20px; }

    .score-section { margin-bottom: 20px; }

    .score-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .score-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .score-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--gray-900);
      font-variant-numeric: tabular-nums;
    }

    .score-track {
      width: 100%;
      height: 4px;
      background: var(--gray-200);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .details-list { list-style: none; }

    .details-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--gray-100);
    }

    .details-list li:last-child { border-bottom: none; }

    .detail-key {
      color: var(--gray-600);
      text-transform: capitalize;
    }

    .detail-val { font-weight: 500; }
    .detail-val.normal { color: var(--green); }
    .detail-val.warning { color: var(--amber); }
    .detail-val.critical { color: var(--red); }

    .result-ts {
      margin-top: 16px;
      font-size: 12px;
      color: var(--gray-400);
    }

    /* -------------------------------------------------------
       Alerts
    ------------------------------------------------------- */
    .alert-list {
      padding: 0;
      max-height: 500px;
      overflow-y: auto;
    }

    .alert-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--gray-100);
      animation: fadeUp 0.2s ease;
    }

    .alert-item:last-child { border-bottom: none; }

    .alert-left { display: flex; flex-direction: column; gap: 2px; }

    .alert-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-900);
    }

    .alert-time {
      font-size: 12px;
      color: var(--gray-400);
    }

    .alert-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .alert-dot.critical { background: var(--red); }
    .alert-dot.high     { background: var(--red); }
    .alert-dot.medium   { background: var(--amber); }
    .alert-dot.low      { background: var(--green); }
    .alert-dot.healthy  { background: var(--green); }

    .alert-empty {
      padding: 48px 24px;
      text-align: center;
      color: var(--gray-400);
      font-size: 13px;
    }

    /* -------------------------------------------------------
       Model footer
    ------------------------------------------------------- */
    .model-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--gray-500);
      padding: 16px;
    }

    .model-footer span { white-space: nowrap; }

    .sep {
      color: var(--gray-300);
    }

    /* -------------------------------------------------------
       Responsive
    ------------------------------------------------------- */
    @media (max-width: 768px) {
      .nav { padding: 0 16px; }
      .container { padding: 16px 16px 48px; }
      .stats { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .main-grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
      .btn-group { flex-wrap: wrap; }
      .stat-card span { font-size: 26px; }
    }

    @media (max-width: 480px) {
      .stats { grid-template-columns: 1fr; }
      .btn-group { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <!-- =====================================================
       Navigation
  ====================================================== -->
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-dot"></div>
      NetGuard
    </div>
    <div class="nav-right">
      <div class="status-badge" id="statusBadge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Online</span>
      </div>
      <span class="nav-time" id="clock"></span>
    </div>
  </nav>

  <div class="container">

    <!-- ===================================================
         Stats
    ==================================================== -->
    <div class="stats">
      <div class="stat-card">
        <p>Servers</p>
        <span id="statServers">0</span>
      </div>
      <div class="stat-card">
        <p>Checks</p>
        <span id="statChecks">0</span>
      </div>
      <div class="stat-card">
        <p>Anomalies</p>
        <span id="statAnomalies">0</span>
      </div>
      <div class="stat-card">
        <p>Rate</p>
        <span id="statRate">0<span class="stat-unit">%</span></span>
      </div>
    </div>

    <!-- ===================================================
         Main grid
    ==================================================== -->
    <div class="main-grid">

      <!-- Left column: Server Analysis -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Server Analysis</h2>
        </div>
        <div class="card-body">

          <!-- Server ID — full width -->
          <div class="form-full">
            <div class="form-group">
              <label for="f_id">Server ID</label>
              <input id="f_id" type="text" placeholder="srv-web-01">
            </div>
          </div>

          <!-- Metric fields — two columns -->
          <div class="form-row">
            <div class="form-group">
              <label for="f_cpu">CPU Usage (%)</label>
              <input id="f_cpu" type="number" step="0.1" placeholder="0 – 100">
            </div>
            <div class="form-group">
              <label for="f_mem">Memory Usage (%)</label>
              <input id="f_mem" type="number" step="0.1" placeholder="0 – 100">
            </div>
            <div class="form-group">
              <label for="f_disk">Disk I/O (MB/s)</label>
              <input id="f_disk" type="number" step="0.1" placeholder="0 – 500">
            </div>
            <div class="form-group">
              <label for="f_net">Network Traffic (Mbps)</label>
              <input id="f_net" type="number" step="0.1" placeholder="0 – 1000">
            </div>
            <div class="form-group">
              <label for="f_err">Error Count</label>
              <input id="f_err" type="number" placeholder="0 – 100">
            </div>
            <div class="form-group">
              <label for="f_resp">Response Time (ms)</label>
              <input id="f_resp" type="number" step="0.1" placeholder="0 – 5000">
            </div>
            <div class="form-group">
              <label for="f_conn">Active Connections</label>
              <input id="f_conn" type="number" placeholder="0 – 500">
            </div>
            <div class="form-group">
              <label for="f_pkt">Packet Loss (%)</label>
              <input id="f_pkt" type="number" step="0.01" placeholder="0 – 100">
            </div>
          </div>

          <!-- Actions -->
          <div class="btn-group">
            <button class="btn btn-blue" id="btnAnalyze">
              <span class="btn-spinner"></span>
              <span class="btn-text">Analyze</span>
            </button>
            <button class="btn btn-outline" id="btnRandom">Random Values</button>
            <button class="btn btn-outline-red" id="btnAnomaly">Test Anomaly</button>
          </div>

          <!-- Result -->
          <div class="result-card" id="resultCard">
            <div class="result-top">
              <span class="result-server" id="resServer"></span>
              <span class="badge" id="resBadge"></span>
            </div>
            <div class="result-body">
              <div class="score-section">
                <div class="score-header">
                  <span class="score-label">Anomaly score</span>
                  <span class="score-value" id="resScore"></span>
                </div>
                <div class="score-track">
                  <div class="score-fill" id="resBar"></div>
                </div>
              </div>
              <ul class="details-list" id="resDetails"></ul>
              <div class="result-ts" id="resTs"></div>
            </div>
          </div>

        </div>
      </div>

      <!-- Right column: Recent Alerts -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Recent Alerts</h2>
          <button class="btn-text-only" id="btnClear">Clear</button>
        </div>
        <div class="alert-list" id="alertList">
          <div class="alert-empty">No alerts yet</div>
        </div>
      </div>

    </div>

    <!-- ===================================================
         Model footer
    ==================================================== -->
    <div class="model-footer" id="modelFooter">
      <span id="mfModel">Model: —</span>
      <span class="sep">|</span>
      <span id="mfPrecision">Precision: —</span>
      <span class="sep">|</span>
      <span id="mfRecall">Recall: —</span>
      <span class="sep">|</span>
      <span id="mfF1">F1: —</span>
    </div>

  </div>

  <script>
    /* =======================================================
       Config
    ======================================================= */
    var API = 'https://network-anomaly-api-894733684211.us-central1.run.app';

    /* =======================================================
       Helpers
    ======================================================= */
    function $(id) { return document.getElementById(id); }

    function esc(str) {
      var el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    function rand(min, max, decimals) {
      var v = Math.random() * (max - min) + min;
      return decimals != null ? Number(v.toFixed(decimals)) : Math.round(v);
    }

    async function api(path, opts) {
      var res = await fetch(API + path, opts);
      if (!res.ok) throw new Error(res.status);
      return res.json();
    }

    /**
     * Turns an ISO/date string into a relative label like "2 min ago".
     */
    function timeAgo(dateStr) {
      var diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
      if (diff < 5)   return 'just now';
      if (diff < 60)  return Math.floor(diff) + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    /* =======================================================
       Clock
    ======================================================= */
    function tickClock() {
      var d = new Date();
      $('clock').textContent = d.toLocaleDateString('en-US', {
        month: 'short', day: 'numeric'
      }) + '  ' + d.toLocaleTimeString('en-US', {
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });
    }
    tickClock();
    setInterval(tickClock, 1000);

    /* =======================================================
       Health check — sets the status badge
    ======================================================= */
    async function loadHealth() {
      try {
        var h = await api('/health');
        var ok = h.status === 'healthy';
        $('statusDot').style.background = ok ? 'var(--green)' : 'var(--red)';
        $('statusText').textContent = ok ? 'Online' : 'Offline';
        $('statusBadge').style.color = ok ? 'var(--green)' : 'var(--red)';
      } catch (e) {
        $('statusDot').style.background = 'var(--red)';
        $('statusText').textContent = 'Offline';
        $('statusBadge').style.color = 'var(--red)';
      }
    }

    /* =======================================================
       Dashboard summary — fills stat cards
    ======================================================= */
    async function loadStats() {
      try {
        var d = await api('/dashboard/summary');
        $('statServers').textContent = d.servers_monitored ?? 0;
        $('statChecks').textContent = (d.total_checks ?? 0).toLocaleString();

        var anom = d.total_anomalies ?? 0;
        var el = $('statAnomalies');
        el.textContent = anom.toLocaleString();
        el.className = anom > 0 ? 'has-anomalies' : '';

        var rate = d.anomaly_rate ?? 0;
        $('statRate').innerHTML = (typeof rate === 'number' ? rate.toFixed(1) : rate) +
          '<span class="stat-unit">%</span>';
      } catch (e) { /* silent */ }
    }

    /* =======================================================
       Model info — fills footer
    ======================================================= */
    async function loadModel() {
      try {
        var m = await api('/model/info');
        var met = m.metrics || m;
        $('mfModel').textContent = 'Model: ' + (m.model_type || m.model || '—');
        $('mfPrecision').textContent = 'Precision: ' +
          (met.precision != null ? Number(met.precision).toFixed(2) : '—');
        $('mfRecall').textContent = 'Recall: ' +
          (met.recall != null ? Number(met.recall).toFixed(2) : '—');
        $('mfF1').textContent = 'F1: ' +
          (met.f1_score != null ? Number(met.f1_score).toFixed(2) : '—');
      } catch (e) { /* silent */ }
    }

    /* =======================================================
       Alerts
    ======================================================= */
    var alerts = [];

    async function loadAlerts() {
      try {
        var d = await api('/alerts');
        var list = d.alerts || [];
        if (list.length === 0) return;
        alerts = list;
        renderAlerts();
      } catch (e) { /* silent */ }
    }

    function renderAlerts() {
      var el = $('alertList');
      if (alerts.length === 0) {
        el.innerHTML = '<div class="alert-empty">No alerts yet</div>';
        return;
      }
      var sorted = alerts.slice().sort(function(a, b) {
        return new Date(b.timestamp) - new Date(a.timestamp);
      });
      el.innerHTML = sorted.map(function(a) {
        var level = (a.risk_level || 'low').toLowerCase();
        return '<div class="alert-item">' +
          '<div class="alert-left">' +
            '<span class="alert-name">' + esc(a.server_id || '—') + '</span>' +
            '<span class="alert-time">' + timeAgo(a.timestamp) + '</span>' +
          '</div>' +
          '<div class="alert-dot ' + level + '"></div>' +
        '</div>';
      }).join('');
    }

    $('btnClear').addEventListener('click', function() {
      alerts = [];
      renderAlerts();
    });

    /* =======================================================
       Form: fill helpers
    ======================================================= */
    function fillRandom() {
      var types = ['web', 'db', 'cache', 'api', 'worker'];
      $('f_id').value = 'srv-' + types[rand(0, types.length - 1)] + '-' + String(rand(1, 20)).padStart(2, '0');
      $('f_cpu').value  = rand(10, 65, 1);
      $('f_mem').value  = rand(20, 60, 1);
      $('f_disk').value = rand(10, 140, 1);
      $('f_net').value  = rand(50, 350, 1);
      $('f_err').value  = rand(0, 6);
      $('f_resp').value = rand(40, 280, 1);
      $('f_conn').value = rand(10, 130);
      $('f_pkt').value  = rand(0, 2, 2);
    }

    function fillAnomaly() {
      var types = ['web', 'db', 'api'];
      $('f_id').value = 'srv-' + types[rand(0, types.length - 1)] + '-' + String(rand(1, 5)).padStart(2, '0');
      $('f_cpu').value  = rand(88, 99, 1);
      $('f_mem').value  = rand(90, 98, 1);
      $('f_disk').value = rand(300, 490, 1);
      $('f_net').value  = rand(800, 970, 1);
      $('f_err').value  = rand(40, 90);
      $('f_resp').value = rand(2000, 4500, 1);
      $('f_conn').value = rand(350, 490);
      $('f_pkt').value  = rand(10, 45, 2);
    }

    $('btnRandom').addEventListener('click', fillRandom);
    $('btnAnomaly').addEventListener('click', fillAnomaly);

    /* =======================================================
       Analyze
    ======================================================= */
    async function analyze() {
      var btn = $('btnAnalyze');
      if (btn.disabled) return;

      var payload = {
        server_id:          $('f_id').value || 'srv-unknown',
        cpu_usage:          Number($('f_cpu').value) || 0,
        memory_usage:       Number($('f_mem').value) || 0,
        disk_io:            Number($('f_disk').value) || 0,
        network_traffic:    Number($('f_net').value) || 0,
        error_count:        Number($('f_err').value) || 0,
        response_time:      Number($('f_resp').value) || 0,
        active_connections: Number($('f_conn').value) || 0,
        packet_loss:        Number($('f_pkt').value) || 0
      };

      btn.disabled = true;
      btn.classList.add('is-loading');

      try {
        var r = await api('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        showResult(r);
        loadStats();
        loadAlerts();
      } catch (e) {
        alert('Analysis failed — check the console.');
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.classList.remove('is-loading');
      }
    }

    $('btnAnalyze').addEventListener('click', analyze);

    /* =======================================================
       Show result
    ======================================================= */
    function showResult(r) {
      var card = $('resultCard');

      // Server name
      $('resServer').textContent = r.server_id || '—';

      // Badge
      var risk = (r.risk_level || 'low').toLowerCase();
      var badge = $('resBadge');
      badge.textContent = r.risk_level || 'HEALTHY';

      if (risk === 'critical' || risk === 'high') {
        badge.className = 'badge badge-red';
      } else if (risk === 'medium') {
        badge.className = 'badge badge-amber';
      } else {
        badge.className = 'badge badge-green';
      }

      // Score bar
      var score = r.anomaly_score ?? 0;
      var pct = Math.min(score * 100, 100);
      $('resScore').textContent = score.toFixed(4);

      var bar = $('resBar');
      bar.style.width = pct + '%';
      if (score > 0.7) bar.style.background = 'var(--red)';
      else if (score > 0.4) bar.style.background = 'var(--amber)';
      else bar.style.background = 'var(--green)';

      // Details list
      var details = r.details || {};
      var html = '';
      Object.keys(details).forEach(function(key) {
        var val = details[key];
        var valLower = (typeof val === 'string' ? val : '').toLowerCase();
        var cls = 'normal';
        if (valLower.includes('high') || valLower.includes('critical') ||
            valLower.includes('excessive') || valLower.includes('overloaded'))
          cls = 'critical';
        else if (valLower.includes('slow') || valLower.includes('warning') || valLower.includes('elevated'))
          cls = 'warning';

        var label = key.replace(/_/g, ' ');
        html += '<li><span class="detail-key">' + esc(label) + '</span>' +
                '<span class="detail-val ' + cls + '">' + esc(val) + '</span></li>';
      });
      $('resDetails').innerHTML = html;

      // Timestamp
      $('resTs').textContent = r.timestamp || '';

      // Show card
      card.classList.remove('visible');
      // Force reflow so the animation replays
      void card.offsetWidth;
      card.classList.add('visible');

      // Push to local alerts if anomaly
      if (r.is_anomaly) {
        alerts.unshift({
          server_id: r.server_id,
          risk_level: r.risk_level,
          anomaly_score: r.anomaly_score,
          timestamp: r.timestamp
        });
        renderAlerts();
      }
    }

    /* =======================================================
       Keyboard shortcut: Enter to analyze
    ======================================================= */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        analyze();
      }
    });

    /* =======================================================
       Init + auto-refresh
    ======================================================= */
    loadHealth();
    loadStats();
    loadModel();
    loadAlerts();

    setInterval(function() {
      loadHealth();
      loadStats();
      loadAlerts();
    }, 30000);
  </script>

</body>
</html>
